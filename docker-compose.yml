version: '3.9'

services:
  bot:
    image: ${DOCKERHUB_USERNAME}/decision-log-bot:latest
    container_name: decision-log-bot
    environment:
      DATABASE_PATH: /data/decisionlog.db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_ALLOWED_USER_ID: ${TELEGRAM_ALLOWED_USER_ID}
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:
