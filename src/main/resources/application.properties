# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=jdbc:sqlite:${DATABASE_PATH:./data/decisionlog.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# Telegram Bot — все через env переменные
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}
telegram.bot.allowed-user-id=${TELEGRAM_ALLOWED_USER_ID}

# Logging
logging.level.com.decisionlog=INFO
logging.level.org.telegram=WARN
