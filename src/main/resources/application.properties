# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/decisionlog}
spring.datasource.username=${DATABASE_USER:decisionlog}
spring.datasource.password=${DATABASE_PASSWORD:decisionlog}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Telegram Bot — все через env переменные
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}
telegram.bot.webhook-url=${TELEGRAM_WEBHOOK_URL}
telegram.bot.allowed-user-id=${TELEGRAM_ALLOWED_USER_ID}

# Logging
logging.level.com.decisionlog=INFO
logging.level.org.telegram=WARN
